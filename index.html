<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DriveCamera" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Drive Camera</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #93c5fd;
    }

    /* ── Config panel ── */
    #config-panel {
      width: 100%;
      max-width: 420px;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #config-panel h2 { font-size: 1rem; color: #94a3b8; }

    #config-panel input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #config-panel input:focus { border-color: #3b82f6; }

    #config-panel label { font-size: 0.8rem; color: #64748b; }

    /* ── Buttons ── */
    button {
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.8; transform: scale(0.97); }

    #btn-signin {
      width: 100%;
      padding: 14px;
      background: #4285f4;
      color: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.95rem;
    }

    #btn-capture {
      width: 100%;
      max-width: 420px;
      padding: 18px;
      background: #3b82f6;
      color: white;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #btn-upload {
      width: 100%;
      padding: 16px;
      background: #22c55e;
      color: white;
    }

    #btn-retake {
      width: 100%;
      padding: 14px;
      background: #334155;
      color: #94a3b8;
    }

    /* ── Preview ── */
    #preview-section {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #preview-img {
      width: 100%;
      border-radius: 16px;
      display: block;
      max-height: 55dvh;
      object-fit: contain;
      background: #1e293b;
    }

    /* ── Status ── */
    #status {
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.2em;
      color: #94a3b8;
    }
    #status.success { color: #4ade80; }
    #status.error   { color: #f87171; }
    #status.loading { color: #93c5fd; }

    /* ── User info strip ── */
    #user-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #64748b;
    }
    #user-bar img {
      width: 28px; height: 28px;
      border-radius: 50%;
    }
    #btn-signout {
      background: none;
      color: #475569;
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #334155;
      margin-left: auto;
    }

    .hidden { display: none !important; }

    /* hidden file input */
    #file-input { display: none; }
  </style>
</head>
<body>

  <h1>📷 Drive Camera</h1>

  <!-- Step 1: enter client ID if not saved -->
  <div id="config-panel" class="hidden">
    <h2>Google OAuth Client ID</h2>
    <label for="client-id-input">Paste your Web Client ID from Google Cloud Console</label>
    <input id="client-id-input" type="text" placeholder="123456789-abc...apps.googleusercontent.com" autocomplete="off" />
    <button id="btn-save-config" style="background:#3b82f6;color:white;padding:12px;">Save &amp; Continue</button>
    <a id="setup-link" href="#" target="_blank" style="font-size:0.78rem;color:#3b82f6;text-align:center;">
      How to get a Client ID →
    </a>
  </div>

  <!-- Step 2: sign in -->
  <div id="signin-section" class="hidden" style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;">
    <div id="user-bar" class="hidden">
      <img id="user-avatar" src="" alt="" />
      <span id="user-name"></span>
      <button id="btn-signout">Sign out</button>
    </div>
    <button id="btn-signin">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Step 3: capture + upload -->
  <input type="file" id="file-input" accept="image/*" capture="environment" />
  <button id="btn-capture" class="hidden">📷 Take Photo</button>

  <div id="preview-section" class="hidden">
    <img id="preview-img" alt="Preview" />
    <button id="btn-upload">☁️ Save to Google Drive</button>
    <button id="btn-retake">↩ Retake</button>
  </div>

  <div id="status"></div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const HARDCODED_CLIENT_ID = '568333821787-uh2iib1kq9e7282rc1i257lndrlt0t9r.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.file';
    const LS_CLIENT_ID = 'drive_cam_client_id';
    const LS_FOLDER_ID = 'drive_cam_folder_id';

    let accessToken = null;
    let capturedFile = null;
    let tokenClient = null;

    // ── Elements ───────────────────────────────────────────────────────────
    const configPanel    = document.getElementById('config-panel');
    const clientIdInput  = document.getElementById('client-id-input');
    const btnSaveConfig  = document.getElementById('btn-save-config');
    const signinSection  = document.getElementById('signin-section');
    const userBar        = document.getElementById('user-bar');
    const userAvatar     = document.getElementById('user-avatar');
    const userName       = document.getElementById('user-name');
    const btnSignin      = document.getElementById('btn-signin');
    const btnSignout     = document.getElementById('btn-signout');
    const fileInput      = document.getElementById('file-input');
    const btnCapture     = document.getElementById('btn-capture');
    const previewSection = document.getElementById('preview-section');
    const previewImg     = document.getElementById('preview-img');
    const btnUpload      = document.getElementById('btn-upload');
    const btnRetake      = document.getElementById('btn-retake');
    const statusEl       = document.getElementById('status');

    // ── Helpers ────────────────────────────────────────────────────────────
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    function clientId() {
      return HARDCODED_CLIENT_ID;
    }

    // ── Init ───────────────────────────────────────────────────────────────
    function init() {
      showSignin();
    }

    function showSignin() {
      configPanel.classList.add('hidden');
      signinSection.classList.remove('hidden');
      initTokenClient();
    }

    function initTokenClient() {
      const id = clientId();
      if (!id || typeof google === 'undefined') {
        // GIS not loaded yet — wait
        setTimeout(initTokenClient, 500);
        return;
      }
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: id,
        scope: SCOPE,
        callback: onTokenReceived,
      });
    }

    function onTokenReceived(resp) {
      if (resp.error) {
        setStatus('Sign-in failed: ' + resp.error, 'error');
        return;
      }
      accessToken = resp.access_token;
      fetchUserInfo();
    }

    async function fetchUserInfo() {
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + accessToken }
        });
        const u = await r.json();
        userAvatar.src = u.picture || '';
        userName.textContent = u.name || u.email || '';
        userBar.classList.remove('hidden');
        btnSignin.classList.add('hidden');
        btnCapture.classList.remove('hidden');
        setStatus('Signed in. Ready to capture.');
      } catch {
        setStatus('Could not fetch user info.', 'error');
      }
    }

    // ── Config ─────────────────────────────────────────────────────────────
    btnSaveConfig.addEventListener('click', () => {
      const id = clientIdInput.value.trim();
      if (!id || !id.includes('.apps.googleusercontent.com')) {
        setStatus('Please enter a valid Client ID.', 'error');
        return;
      }
      localStorage.setItem(LS_CLIENT_ID, id);
      showSignin();
    });

    // ── Auth ───────────────────────────────────────────────────────────────
    btnSignin.addEventListener('click', () => {
      if (!tokenClient) { setStatus('Still loading…', 'loading'); return; }
      tokenClient.requestAccessToken();
    });

    btnSignout.addEventListener('click', () => {
      google.accounts.oauth2.revoke(accessToken, () => {
        accessToken = null;
        userBar.classList.add('hidden');
        btnSignin.classList.remove('hidden');
        btnCapture.classList.add('hidden');
        previewSection.classList.add('hidden');
        capturedFile = null;
        setStatus('Signed out.');
      });
    });

    // ── Camera ─────────────────────────────────────────────────────────────
    btnCapture.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      capturedFile = file;
      previewImg.src = URL.createObjectURL(file);
      btnCapture.classList.add('hidden');
      previewSection.classList.remove('hidden');
      setStatus('');
    });

    btnRetake.addEventListener('click', () => {
      capturedFile = null;
      fileInput.value = '';
      previewSection.classList.add('hidden');
      btnCapture.classList.remove('hidden');
      setStatus('');
    });

    // ── Upload ─────────────────────────────────────────────────────────────
    async function getOrCreateFolder() {
      // Check cache
      const cached = localStorage.getItem(LS_FOLDER_ID);
      if (cached) return cached;

      // Search for existing folder
      const query = encodeURIComponent("name='Drive Camera' and mimeType='application/vnd.google-apps.folder' and trashed=false");
      const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id)`, {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      const searchData = await searchRes.json();
      if (searchData.files && searchData.files.length > 0) {
        const id = searchData.files[0].id;
        localStorage.setItem(LS_FOLDER_ID, id);
        return id;
      }

      // Create folder
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name: 'Drive Camera', mimeType: 'application/vnd.google-apps.folder' })
      });
      const folder = await createRes.json();
      localStorage.setItem(LS_FOLDER_ID, folder.id);
      return folder.id;
    }

    btnUpload.addEventListener('click', async () => {
      if (!capturedFile || !accessToken) return;

      btnUpload.disabled = true;
      setStatus('Uploading…', 'loading');

      try {
        const folderId = await getOrCreateFolder();
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        const filename = `photo-${timestamp}.jpg`;

        const metadata = JSON.stringify({ name: filename, parents: [folderId] });
        const form = new FormData();
        form.append('metadata', new Blob([metadata], { type: 'application/json' }));
        form.append('file', capturedFile);

        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + accessToken },
          body: form
        });

        if (!res.ok) throw new Error(`Upload failed (${res.status})`);
        const data = await res.json();

        setStatus(`Saved: ${data.name}`, 'success');
        // Reset for next shot
        setTimeout(() => {
          capturedFile = null;
          fileInput.value = '';
          previewSection.classList.add('hidden');
          btnCapture.classList.remove('hidden');
          setStatus('Ready for next photo.', 'success');
        }, 2500);
      } catch (err) {
        setStatus(err.message, 'error');
      } finally {
        btnUpload.disabled = false;
      }
    });

    // ── Service Worker ─────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    init();
  </script>
</body>
</html>
